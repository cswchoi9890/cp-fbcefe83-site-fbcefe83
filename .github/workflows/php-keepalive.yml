name: WordPress PHP keep-alive (최대 20초 대기)

on:
  workflow_dispatch:
  schedule:
    # 5분마다 트리거 → job 15개가 20초 간격 오프셋으로 분산 실행
    # cold start: setup-php 캐시 활용으로 ~20초 → 최대 대기 20초 달성
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 * * * *'

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

  slot-s000:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: sqlite3, mbstring, xml, curl, zip, gd, intl, opcache
          coverage: none
          tools: none
      - name: nginx 설치
        run: |
          sudo apt-get install -y --no-install-recommends nginx 2>/dev/null
      - name: offset 0s 후 PHP 서버 기동
        run: |
          bash .github/scripts/php-keepalive.sh 0

  slot-s020:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: sqlite3, mbstring, xml, curl, zip, gd, intl, opcache
          coverage: none
          tools: none
      - name: nginx 설치
        run: |
          sudo apt-get install -y --no-install-recommends nginx 2>/dev/null
      - name: offset 20s 후 PHP 서버 기동
        run: |
          sleep 20
          bash .github/scripts/php-keepalive.sh 20

